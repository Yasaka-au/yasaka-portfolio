    <script src="sync_drive.js"></script>
    <script>
        // Start Sync (Fallback to hardcoded if SCRIPT_URL is not set)
        syncPortfolioFolder('1iwJ8oMSCawtn5uKiKHahCpINp5-E4REv', 'image');

        // Initialize Masonry after images load (Logic moved to sync_drive.js, 
        // but we keep a local fallback trigger if sync_drive is skipped)
        if (typeof initializeGallery !== 'undefined') {
            // Check if hardcoded items should be displayed initially
            const grid = document.querySelector('.masonry-grid');
            if (grid.children.length > 0) {
                initializeGallery();
            }
        }

        // Custom Cursor Logic (Simple version for subpage)
        const cursor = document.querySelector('.custom-cursor');
        const glow = document.querySelector('.cursor-glow');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Initialize Lucide
        lucide.createIcons();
    </script>
