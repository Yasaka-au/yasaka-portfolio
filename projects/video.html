<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Projects | Yasaka Creations</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="graphics.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.407.0/dist/umd/lucide.min.js"></script>
</head>

<body class="subpage-active">
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <div class="cursor-glow"></div>

    <nav class="main-header scrolled">
        <div class="logo">Yasaka<span>_Creations</span></div>
        <div class="nav-links">
            <a href="../index.html" class="nav-item">Back to Home</a>
        </div>
    </nav>

    <main class="subpage-content">
        <section class="project-hero">
            <div class="container">
                <h1 class="reveal-up">Video <span class="text-gradient">Projects</span></h1>
                <p class="reveal-up">Cinematic storytelling and visual effects that bring imagination to life.</p>
            </div>
        </section>

        <section class="gallery-section">
            <div class="container">
                <div id="loading-state" class="loading-container">
                    <h2 class="loading-title">Rendering Clips<span>...</span></h2>
                    <div class="loading-bar">
                        <div class="loading-progress"></div>
                    </div>
                </div>
                <div class="masonry-grid">
                    <!-- Videos from Google Drive -->
                    <div class="masonry-item video-item">
                        <iframe src="https://drive.google.com/file/d/1ArKMgCO64HigjXpIlkdq9NmdtJoH3JNu/preview"
                            allow="autoplay"></iframe>
                    </div>
                    <div class="masonry-item video-item">
                        <iframe src="https://drive.google.com/file/d/1HxxQlltQJuv1PYnU_DdDgqfvtZnRbe9G/preview"
                            allow="autoplay"></iframe>
                    </div>
                    <div class="masonry-item video-item">
                        <iframe src="https://drive.google.com/file/d/1kaLxMT_UD0SOqHZESf2ODJpYHE8SyOBA/preview"
                            allow="autoplay"></iframe>
                    </div>
                    <div class="masonry-item video-item">
                        <iframe src="https://drive.google.com/file/d/1078QA4nH_h_Gvg8WGrdQBM4q_BDvGEbP/preview"
                            allow="autoplay"></iframe>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="taped-footer">
        <div class="footer-bottom">
            <p>©2025 Yasaka Creations Studio. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="sync_drive.js"></script>
    <script>
        const grid = document.querySelector('.masonry-grid');
        const loading = document.getElementById('loading-state');

        // Start Sync
        syncPortfolioFolder('12HzZpEHteyfAn1GMI4v0XxpwtcnTdKoi', 'video');

        if (typeof initializeGallery !== 'undefined' && grid.children.length > 0) {
            initializeGallery();
        }

        // For videos, we use a timeout or check if iframes are loaded
        gsap.to('.project-hero .reveal-up', {
            opacity: 1,
            y: 0,
            duration: 1,
            stagger: 0.2,
            ease: "power3.out",
            delay: 0.2
        });

        window.onload = function () {
            gsap.to(loading, {
                opacity: 0,
                y: -20,
                duration: 0.5,
                onComplete: () => loading.style.display = 'none'
            });

            var msnry = new Masonry(grid, {
                itemSelector: '.masonry-item',
                columnWidth: '.masonry-item',
                percentPosition: true,
                gutter: 20
            });

            gsap.to('.masonry-item', {
                opacity: 1,
                y: 0,
                duration: 0.8,
                stagger: 0.1,
                ease: "power2.out"
            });
        };

        const cursor = document.querySelector('.custom-cursor');
        const glow = document.querySelector('.cursor-glow');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        lucide.createIcons();
    </script>
</body>

</html>
