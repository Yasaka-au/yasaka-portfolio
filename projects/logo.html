<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Designs | Yasaka Creations</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="graphics.css">
    <link rel="stylesheet" href="logo.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.407.0/dist/umd/lucide.min.js"></script>
</head>

<body class="subpage-active">
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <div class="cursor-glow"></div>

    <nav class="main-header scrolled">
        <div class="logo">Yasaka<span>_Creations</span></div>
        <div class="nav-links">
            <a href="../index.html" class="nav-item">Back to Home</a>
        </div>
    </nav>

    <main class="subpage-content">
        <section class="project-hero">
            <div class="container">
                <h1 class="reveal-up">Logo <span class="text-gradient">Designs</span></h1>
                <p class="reveal-up">Modern minimalist brand identities crafted with precision and purpose.</p>
            </div>
        </section>

        <section class="gallery-section">
            <div class="container">
                <div id="loading-state" class="loading-container">
                    <h2 class="loading-title">Extracting Identities<span>...</span></h2>
                    <div class="loading-bar">
                        <div class="loading-progress"></div>
                    </div>
                </div>
                <div class="masonry-grid">
                    <!-- Logos from Google Drive -->
                    <div class="masonry-item">
                        <img src="https://lh3.googleusercontent.com/u/0/d/1tiDyIWYOdpDMFfgEl72dTqu2gXSvgals"
                            alt="Logo Design">
                    </div>
                    <div class="masonry-item">
                        <img src="https://lh3.googleusercontent.com/u/0/d/1yqElFdA7XA5E5h5RBkk36miaKh-k1WMj"
                            alt="Logo Design">
                    </div>
                    <div class="masonry-item">
                        <img src="https://lh3.googleusercontent.com/u/0/d/1YqqJKNd9beKQ41dRERWldwd3v8hmN3gN"
                            alt="Logo Design">
                    </div>
                    <div class="masonry-item">
                        <img src="https://lh3.googleusercontent.com/u/0/d/1sNJ3ds9LsJTKtkvtuz6XH4V6gy6MERau"
                            alt="Logo Design">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="taped-footer">
        <div class="footer-bottom">
            <p>©2025 Yasaka Creations Studio. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="sync_drive.js"></script>
    <script>
        // Initialize Masonry after images load
        const grid = document.querySelector('.masonry-grid');
        const loading = document.getElementById('loading-state');

        // Start Sync
        syncPortfolioFolder('1YcedJ2C1a8QgEUbJXDvgdYl2JoUrkfp7', 'image');

        if (typeof initializeGallery !== 'undefined' && grid.children.length > 0) {
            initializeGallery();
        }

        const cursor = document.querySelector('.custom-cursor');
        const glow = document.querySelector('.cursor-glow');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        lucide.createIcons();
    </script>
</body>

</html>
